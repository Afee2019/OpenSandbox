# fleet-test.yaml — M1 验收测试配置
# 最小化配置，验证编排循环的核心流程：拉起 → 健康检查 → kill → 自愈

apiVersion: jcsandbox/v1
kind: Fleet

defaults:
  image: jcdo:local
  timeout: 3600
  sandbox_server: http://localhost:8310
  jclink_base_url: ""

# 不配置网络策略，允许所有出站（测试用）
network_policies: {}

deployments:
  - name: test-bot
    replicas: 1
    template:
      agent:
        id: test-agent
        model: deepseek/deepseek-chat
        identity:
          name: "测试Bot"
        skills: []
      jclink:
        token: ""
        group_policy: open

health:
  startup_timeout: 120
  check_interval: 15
  liveness_failures: 2
  readiness_endpoint: /health
